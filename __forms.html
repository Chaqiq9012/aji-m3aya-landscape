<!-- Static HTML for Netlify Forms build-time detection (SSR/SPA requirement) -->
<!-- This file is NOT shown to users — it exists only so Netlify registers the form -->
<html>
  <body>
    <form name="consultation" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="consultation" />
      <input name="bot-field" />
      <input name="fullName" />
      <input name="phone" />
      <input name="city" />
      <input name="address" />
      <input name="instagram" />
      <input name="budget" />
      <input name="storeType" />
      <input name="storeName" />
      <input name="preferredDate" />
    </form>
  </body>
</html>
